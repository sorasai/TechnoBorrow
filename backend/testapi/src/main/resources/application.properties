# Database connection configuration (with environment variable support for cloud deployment)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.fpohpcpdejokkvhormqa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:technoborrow342.}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool Settings (Optimized for Supabase Free Tier to prevent EMAXCONNSESSION)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Port (Render dynamically sets the PORT environment variable)
server.port=${PORT:8080}